name: docker-publish

on:
  push:
    branches: [main]      # publishes :latest for the GitOps deploy to track
    tags: ['v*']          # publishes semver tags (1.2.3, 1.2) for pinning later
  workflow_dispatch:      # build-only sanity check (no publish)

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # go-fitz bundles MuPDF as a prebuilt static lib, so the cgo build needs
      # only the C toolchain already on the runner — no system CV/PDF packages.
      - name: build
        run: go build ./...
      - name: test
        run: go test -race -count=1 ./...

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # packages:write scoped to the only job that pushes to GHCR.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@v4   # register arm64 emulation for the cross-build
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/paperboy
          # main push -> latest + sha-<short> (immutable, for rollback).
          # v* tag   -> 1.2.3 + 1.2 (for pinning once the project stabilizes).
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          # No attestation consumers: skip provenance so the manifest list holds
          # only the real platforms (default provenance adds unknown/unknown).
          provenance: false
          # Multi-arch: go-fitz bundles prebuilt static MuPDF for both arches,
          # so the emulated arm64 cgo build just links (no C source compile).
          platforms: linux/amd64,linux/arm64
          # workflow_dispatch is a build-only sanity check; don't publish it.
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp build metadata into internal/buildinfo (see docker/Dockerfile).
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
